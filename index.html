<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteSMS | Secure Login</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body class="auth-layout">
    <div class="glow-bg"></div>
    <div class="auth-card">
        <div class="text-center mb-4">
            <h1 class="logo-text">ELITE<span>SMS</span></h1>
            <p class="text-muted">Premium OTP Marketplace</p>
        </div>
        <form id="loginForm">
            <div class="input-group-premium mb-3">
                <input type="email" id="email" placeholder="Email Address" required>
            </div>
            <div class="input-group-premium mb-4">
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn-main w-100">INITIALIZE LOGIN</button>
        </form>
        <div class="divider"><span>OR</span></div>
        <button id="googleLogin" class="btn-glass w-100">
            <img src="https://icons8.com" class="me-2"> Continue with Google
        </button>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
